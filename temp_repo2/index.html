<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주명리 캐릭터 프롬프트 엔진</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#08080a;color:#d0d0d0;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:12px}
h1{font-size:20px;font-weight:900;text-align:center;background:linear-gradient(90deg,#ef5350,#ff9800,#66bb6a,#42a5f5,#ab47bc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.sub{font-size:11px;color:#666;text-align:center;margin-bottom:14px}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.grid60{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin-bottom:14px}
.grid60 button{padding:5px 0;font-size:13px;font-weight:500;cursor:pointer;background:#141414;color:#888;border:1px solid #2a2a2a;border-radius:3px;transition:all .12s;font-family:inherit}
.grid60 button:hover{border-color:#555}
.sl{font-size:8px;opacity:.6;display:block}
.panel{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:10px;padding:2px 7px;background:#1a1a1a;border-radius:2px;color:#999;display:inline-block;margin:2px}
.gbtn{padding:5px 16px;font-size:13px;font-weight:700;border-radius:3px;cursor:pointer;border:1px solid #333;background:#1a1a1a;color:#555;font-family:inherit}
.gbtn.am{background:#1565C0;color:#fff;border-color:#1565C0}
.gbtn.af{background:#C62828;color:#fff;border-color:#C62828}
.wlabel{font-size:11px;color:#888;margin-bottom:4px;font-weight:700}
.wg{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;margin-bottom:10px}
.wg button{padding:5px 2px;font-size:9px;cursor:pointer;background:#1a1a1a;color:#999;border:1px solid #2a2a2a;border-radius:2px;font-family:inherit;transition:all .1s}
.wg button:hover{border-color:#555;color:#ccc}
.wg button.sel{background:#444;color:#fff;border-color:#666;font-weight:700}
.rel-box{padding:6px 10px;margin-bottom:8px;border-radius:4px;font-size:11px}
.rel-h{background:#1B5E2033;border:1px solid #2E7D32;color:#81C784}
.rel-c{background:#C6282833;border:1px solid #C62828;color:#EF9A9A}
.psec{margin-bottom:14px}
.plbl{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.ptxt{width:100%;min-height:120px;font-size:11px;line-height:1.8;padding:10px;background:#0a0d12;border-radius:4px;border:1px solid #1a1a1a;color:#bbb;resize:vertical;font-family:'Noto Sans KR',sans-serif;outline:none}
.ptxt:focus{border-color:#555}
.ptxt.big{min-height:280px;font-size:12px;line-height:1.9;color:#ddd}
.cbtn{font-size:12px;padding:5px 16px;background:#ff9800;color:#000;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700}
.cbtn.ok{background:#2E7D32;color:#fff}
.cbtn2{font-size:11px;padding:4px 12px;background:#333;color:#ccc;border:1px solid #555;border-radius:3px;cursor:pointer;font-family:inherit}
.cbtn2.ok{background:#2E7D32;color:#fff}
.guide{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:12px;font-size:10px;color:#666;line-height:1.8;margin-top:10px}
.guide strong{color:#aaa}
.tip{font-size:10px;color:#ff9800;margin-top:4px}
.jbtn{padding:10px 2px;font-size:10px;cursor:pointer;background:#1a1a1a;color:#999;border:1px solid #2a2a2a;border-radius:2px;font-family:inherit;transition:all .1s}
.jbtn:hover{border-color:#555;color:#ccc}
.jbtn.jsel{background:#ff9800;color:#000;border-color:#ff9800;font-weight:700}
.jg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">
<h1>四柱命理 캐릭터 프롬프트 엔진</h1>
<p class="sub">일주 선택 → 성별 → 월지(선택) → 복사 → AI에 붙여넣기</p>
<div id="app"><div class="loading">⏳ 데이터 로딩 중...</div></div>
</div>
<textarea id="hc" style="position:fixed;top:-9999px;left:-9999px"></textarea>

<script>
// ================================================================
// 오행 매핑 (고정)
// ================================================================
const OH_MAP={甲:'목',乙:'목',丙:'화',丁:'화',戊:'토',己:'토',庚:'금',辛:'금',壬:'수',癸:'수'};
const YY_MAP={甲:'양',乙:'음',丙:'양',丁:'음',戊:'양',己:'음',庚:'양',辛:'음',壬:'양',癸:'음'};
const KR_CH={甲:'갑',乙:'을',丙:'병',丁:'정',戊:'무',己:'기',庚:'경',辛:'신',壬:'임',癸:'계'};
const KR_JI={子:'자',丑:'축',寅:'인',卯:'묘',辰:'진',巳:'사',午:'오',未:'미',申:'신',酉:'유',戌:'술',亥:'해'};
const OC={목:'#2E7D32',화:'#C62828',토:'#cf7e0a',금:'#546E7A',수:'#1565C0'};
const IL=["甲子","乙丑","丙寅","丁卯","戊辰","己巳","庚午","辛未","壬申","癸酉","甲戌","乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未","甲申","乙酉","丙戌","丁亥","戊子","己丑","庚寅","辛卯","壬辰","癸巳","甲午","乙未","丙申","丁酉","戊戌","己亥","庚子","辛丑","壬寅","癸卯","甲辰","乙巳","丙午","丁未","戊申","己酉","庚戌","辛亥","壬子","癸丑","甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申","辛酉","壬戌","癸亥"];
const YK={'子丑':'토','丑子':'토','寅亥':'목','亥寅':'목','卯戌':'화','戌卯':'화','辰酉':'금','酉辰':'금','巳申':'수','申巳':'수','午未':'토','未午':'토'};
const CG=new Set(['子午','午子','丑未','未丑','寅申','申寅','卯酉','酉卯','辰戌','戌辰','巳亥','亥巳']);
const WJ_JI=['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
const SEASON_MAP={寅:'봄',卯:'봄',辰:'봄(환절기)',巳:'여름',午:'여름',未:'여름(환절기)',申:'가을',酉:'가을',戌:'가을(환절기)',亥:'겨울',子:'겨울',丑:'겨울(환절기)'};
const SEASON_MOOD={寅:'생기·녹색·아침빛',卯:'발랄·연두·봄볕',辰:'흐림·황녹·환절기안개',巳:'화사·적색·정오빛',午:'강렬·주홍·한낮',未:'무더위·황적·습한공기',申:'서늘·금색·석양',酉:'차가움·은백·달빛시작',戌:'쓸쓸·갈색·저녁놀',亥:'깊이·남색·한밤',子:'은밀·흑청·자정',丑:'인내·무광·새벽안개'};

function cr(a,b){const p=a+b;if(YK[p])return{t:'육합',d:a+b+'합'+YK[p],pk:'조화롭고 안정된 에너지.'};if(CG.has(p))return{t:'충',d:a+b+'충',pk:'내면의 긴장. 충돌하는 이중 에너지.'};return{t:'',d:'',pk:''};}

// ================================================================
// 데이터 로드
// ================================================================
let DB = null;
let S = {ilju:null, g:'남', w:null, job:null};

// ================================================================
// 십성→직업, 직업→비주얼 = JSON(DB)에서 읽음
// DB.sipsung_jobs, DB.job_visual
// ================================================================

// ================================================================

// ================================================================
// 일주+성별 기반 직업 리스트 생성 (최대 10개)
// ================================================================
function getJobList(il, g) {
  const ch = il[0];
  const gKey = g === '남' ? '남' : '녀';
  const iu = getIljuUnique(il);
  const gt = getGenderTraits(ch, gKey);

  // 1) 천간×성별 직업방향 (시트10)
  const chJobs = (gt['직업방향'] || '').split(/[,，]/).map(s => s.trim()).filter(Boolean);

  // 2) 일지십성 직업방향 (시트6 → JSON sipsung_jobs)
  const ss = iu['일지십성'] || '';
  const ssJobStr = (DB.sipsung_jobs || {})[ss] || '';
  const ssJobs = ssJobStr.split(/[,，]/).map(s => s.trim()).filter(Boolean);

  // 3) 보충풀: 다른 십성 직업 전부 (부족 시 사용)
  const allSsJobs = [];
  for (const k in (DB.sipsung_jobs || {})) {
    if (k !== ss) {
      (DB.sipsung_jobs[k] || '').split(/[,，]/).forEach(j => {
        const t = j.trim();
        if (t) allSsJobs.push(t);
      });
    }
  }

  // 중복 제거하면서 순서 유지 (천간 우선 → 일지십성 → 기타십성)
  const seen = new Set();
  const result = [];
  for (const j of [...chJobs, ...ssJobs, ...allSsJobs]) {
    // job_visual에 있는 직업만 포함 (프롬프트 매핑 보장)
    if (!seen.has(j) && result.length < 30) {
      seen.add(j);
      result.push(j);
    }
  }
  return result;
}

async function init() {
  try {
    const res = await fetch('saju_db.json');
    if (!res.ok) throw new Error('파일 없음');
    DB = await res.json();
    console.log('DB 로드 완료:', Object.keys(DB.dna).length, '일주 DNA');
    console.log('DB 키:', Object.keys(DB));
    console.log('sipsung_jobs:', DB.sipsung_jobs ? Object.keys(DB.sipsung_jobs).length + '개 십성' : '❌ 없음!');
    console.log('job_visual:', DB.job_visual ? Object.keys(DB.job_visual).length + '개 직업' : '❌ 없음!');
    console.log('甲_남 직업방향:', (DB.gender_traits?.['甲_남']?.['직업방향']||'없음').substring(0,60));
    renderApp();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="loading" style="color:#ef5350">
        ❌ saju_db.json 파일을 불러올 수 없습니다.<br><br>
        <span style="font-size:12px;color:#888">
        이 HTML과 같은 폴더에 saju_db.json이 있어야 합니다.<br>
        excel_to_json.py로 DB를 먼저 변환하세요.<br>
        로컬에서 열려면 Live Server가 필요합니다. (GitHub Pages에서는 자동 작동)
        </span>
      </div>`;
  }
}

// ================================================================
// DB 헬퍼 — DNA 데이터 가져오기 (공통 + 성별 병합)
// ================================================================
function getDNA(ilju, gender) {
  const d = DB.dna[ilju];
  if (!d) return {};
  const com = d.common || {};
  const gen = gender === '남' ? (d.male || {}) : (d.female || {});
  // 성별 데이터가 있으면 성별 우선, 없으면 공통 폴백
  const merged = {...com};
  for (const k in gen) {
    if (gen[k]) merged[k] = gen[k];
  }
  return merged;
}

// 공통 DNA만
function getDNACommon(ilju) {
  return (DB.dna[ilju] || {}).common || {};
}

// 성별 DNA만 (오버라이드용)
function getDNAGender(ilju, gender) {
  const d = DB.dna[ilju];
  if (!d) return {};
  return gender === '남' ? (d.male || {}) : (d.female || {});
}

// 천간별 성별 특성 (시트10)
function getGenderTraits(ch, gender) {
  return DB.gender_traits[ch + '_' + gender] || {};
}

// 일주 고유 특성 (시트11)
function getIljuUnique(ilju) {
  return DB.ilju_unique[ilju] || {};
}

// ================================================================
// 프롬프트 생성 — 웹 AI용 (설명형)
// ================================================================
function genWebAI(il, g, w, job) {
  const ch = il[0], ji = il[1];
  const oh = OH_MAP[ch], yy = YY_MAP[ch];
  const gkr = g === '남' ? '남성' : '여성';

  // DNA 데이터 (공통 + 성별 병합)
  const dna = getDNA(il, g);
  const dnaG = getDNAGender(il, g);
  const dnaC = getDNACommon(il);
  const gt = getGenderTraits(ch, g === '남' ? '남' : '녀');
  const iu = getIljuUnique(il);

  let t = `아래 설정을 기반으로 **일본 소년만화 스타일**(나루토, 주술회전 화풍)의 캐릭터 일러스트를 그려주세요.\n\n`;

  // ─── 기본 정보 ───
  t += `■ 기본 정보\n`;
  t += `- 일주: ${il} (${KR_CH[ch]}${KR_JI[ji]}) | 오행: ${oh}(${yy}) | 12운성: ${iu['십이운성']||''} | 일지십성: ${iu['일지십성']||''}\n`;
  t += `- 성별: ${gkr}\n`;
  if (iu['납음']) t += `- 납음: ${iu['납음']} — ${iu['납음해석']||''}\n`;

  if (w) {
    const season = SEASON_MAP[w] || '';
    const mood = SEASON_MOOD[w] || '';
    const r = cr(ji, w);
    t += `- 월지: ${KR_JI[w]}(${w}) | 계절: ${season} | 분위기: ${mood}\n`;
    if (r.t) t += `  → 일지·월지 관계: ${r.d} — ${r.pk}\n`;
  }

  // ─── 성격·기질 (설명형) ───
  t += `\n■ 성격·기질\n`;

  // 1) 일주 고유 성격
  if (iu['고유성격']) {
    t += `【일주 고유 성격】\n${iu['고유성격']}\n\n`;
  }

  // 2) 성별 성격 분기 — 시트10(전문) 우선, DNA H1은 보조
  const personality10 = (gt['성격분기'] || '').trim();
  const personalityDNA = (dnaG['H1_표정온도'] || '').trim();
  const personalitySource = personality10.length >= personalityDNA.length ? personality10 : personalityDNA;
  if (personalitySource) {
    t += `【${gkr} 성격 특징】\n${personalitySource}\n\n`;
  }

  // 3) 분위기·존재감 — 공통이 더 풍부하면 공통 사용
  const atmoCommon = (dnaC['H2_분위기'] || '').trim();
  const atmoGender = (dnaG['H2_분위기'] || '').trim();
  const atmosphere = atmoCommon.length >= atmoGender.length ? atmoCommon : atmoGender;
  if (atmosphere) {
    t += `【분위기·존재감】\n${atmosphere}\n\n`;
  }

  // 4) 감정의 중력
  const emotion = (dna['H5_감정중력'] || '').trim();
  if (emotion) {
    t += `【감정의 중력】\n${emotion}\n\n`;
  }

  // 5) 관계 패턴
  if (gt['관계패턴']) {
    t += `【관계 패턴】\n${gt['관계패턴']}\n\n`;
  }

  // ─── 외형 상세 (설명형) ───
  t += `■ 캐릭터 외형 상세\n`;

  // 골격·체형
  const bodyDesc = (dnaG['A1_골격'] || dnaC['A1_골격'] || '').trim();
  const silhouette = (dnaG['A2_체형'] || dnaC['A2_체형'] || '').trim();
  if (bodyDesc) t += `【체형·골격】\n${bodyDesc}\n`;
  if (silhouette) t += `【실루엣·자세】\n${silhouette}\n`;

  // 얼굴
  const face = (dnaG['B1_얼굴형'] || dnaC['B1_얼굴형'] || '').trim();
  if (face) t += `【얼굴형】\n${face}\n`;

  // 눈
  const eyes = (dnaG['B2_눈'] || dnaC['B2_눈'] || '').trim();
  if (eyes) t += `【눈·눈빛】\n${eyes}\n`;

  // 이면의 눈매 (감정 고조 시)
  const hiddenEyes = (dna['B3_이면눈매'] || '').trim();
  if (hiddenEyes) t += `【감정 고조 시 눈빛 변화】\n${hiddenEyes}\n→ 전투/각성이 아닌, 결의·분노·감동 등 감정이 고조될 때의 눈빛 변화로 해석.\n`;

  // 눈썹
  const brow = (dna['B4_눈썹'] || '').trim();
  if (brow) t += `【눈썹】\n${brow}\n`;

  // 코·입
  const nose = (dna['B5_코'] || '').trim();
  const mouth = (dna['B6_입'] || '').trim();
  if (nose) t += `【코】\n${nose}\n`;
  if (mouth) t += `【입】\n${mouth}\n`;

  // 얼굴 음영
  const faceShadow = (dna['B7_얼굴음영'] || '').trim();
  if (faceShadow) t += `【얼굴 음영】\n${faceShadow}\n`;

  // 피부톤
  const skin = (dnaG['C1_피부톤'] || dnaC['C1_피부톤'] || '').trim();
  if (skin) t += `【피부톤·질감】\n${skin}\n`;

  // 헤어
  const hair = (dnaG['D1_헤어'] || dnaC['D1_헤어'] || '').trim();
  const hairPhysics = (dna['D2_머리물리'] || '').trim();
  if (hair) t += `【헤어 스타일】\n${hair}\n`;
  if (hairPhysics) t += `【머리카락 물리】\n${hairPhysics}\n`;

  // 수염 (남성)
  if (g === '남') {
    const beard = (dnaG['D3_수염'] || dnaC['D3_수염'] || '').trim();
    if (beard) t += `【수염·체모】\n${beard}\n`;
  }

  // ─── 직업·의상·스타일 ───
  if (job && (DB.job_visual||{})[job]) {
    t += `\n■ 직업·의상\n`;
    t += `【직업】${job}\n`;
    t += `【직업 비주얼】\n${DB.job_visual[job].desc}\n`;
    t += `※ 위 직업 비주얼을 최우선으로 반영하되, 아래 오행 기반 색감·소재를 의상에 은은히 녹여주세요.\n`;
    // 오행 색감 보조로만
    const top = (dnaG['E2_상의'] || dnaC['E2_상의'] || '').trim();
    if (top) t += `【오행 색감·소재 참고】\n${top}\n`;
  } else {
    t += `\n■ 의상·스타일\n`;
    const outfit = (dnaG['E1_의복핏'] || dnaC['E1_의복핏'] || '').trim();
    const top = (dnaG['E2_상의'] || dnaC['E2_상의'] || '').trim();
    const bottom = (dnaG['E3_하의'] || dnaC['E3_하의'] || '').trim();
    const shoes = (dnaG['E5_신발'] || dnaC['E5_신발'] || '').trim();
    if (outfit) t += `【의복·핏】\n${outfit}\n`;
    if (top) t += `【상의】\n${top}\n`;
    if (bottom) t += `【하의】\n${bottom}\n`;
    if (shoes) t += `【신발】\n${shoes}\n`;
    // 스타일 분기 (시트10)
    if (gt['스타일분기']) t += `【${gkr} 스타일 방향】\n${gt['스타일분기']}\n`;
  }

  // ─── 오행 장식·디테일 ───
  const headAcc = (dna['F1_머리악세'] || '').trim();
  const bodyAcc = (dna['F2_몸악세'] || '').trim();
  const pattern = (dna['F5_인장문양'] || '').trim();
  const effectColor = (dna['G2_이펙트컬러'] || '').trim();
  if (headAcc || bodyAcc || pattern || effectColor) {
    t += `\n■ 오행 장식·디테일\n`;
    t += `※ 아래는 무기·판타지 아이템이 아닌, 의상·악세서리·헤어에 은은히 녹아드는 장식 디테일입니다.\n`;
    if (headAcc) t += `【머리·얼굴 포인트】\n${headAcc}\n→ 헤어핀, 귀걸이, 안경 프레임, 머리끈 등 현대적 악세서리의 색감·소재에 반영.\n`;
    if (bodyAcc) t += `【몸·의상 포인트】\n${bodyAcc}\n→ 목걸이, 팔찌, 반지, 벨트, 단추, 자수, 의상 안감 색상 등에 자연스럽게 반영.\n`;
    if (pattern) t += `【문양·모티프】\n${pattern}\n→ 의상의 자수, 프린팅, 단추 문양, 악세서리 각인 등에 미세하게 반영. 과하지 않게.\n`;
    if (effectColor) t += `【오행 컬러 악센트】\n${effectColor}\n→ 위 색상을 의상 안감, 신발 밑창, 눈동자 하이라이트, 머리카락 끝 그라데이션 등에 미세 반영.\n`;
  }

  // ─── 연기·포즈 ───
  t += `\n■ 표정·포즈·연출\n`;
  const exprTemp = (dnaC['H1_표정온도'] || '').trim();
  if (exprTemp) t += `【표정 온도】\n${exprTemp}\n`;
  const gesture = (dnaG['H3_제스처'] || dnaC['H3_제스처'] || '').trim();
  if (gesture) t += `【시그니처 제스처】\n${gesture}\n`;
  const voice = (dna['H4_음성톤'] || '').trim();
  if (voice) t += `【음성 톤 (분위기 참고)】\n${voice}\n`;
  const age = (dna['H7_나이대종족'] || '').trim();
  if (age) t += `【나이대·종족】\n${age}\n`;

  // ─── 월지 보정 ───
  if (w) {
    const season = SEASON_MAP[w] || '';
    const mood = SEASON_MOOD[w] || '';
    t += `\n■ 월지(${KR_JI[w]}·${w}) 보정\n`;
    t += `이 캐릭터는 ${season}(${KR_JI[w]}월) 태생입니다.\n`;
    t += `계절 분위기(${mood})를 의상 색감·조명·전체 톤에 은은히 반영하세요.\n`;
    const r = cr(ji, w);
    if (r.t === '육합') {
      t += `일지·월지가 ${r.d}으로 조화롭게 결합합니다. 안정적이고 통일된 에너지를 외형에서 느낄 수 있도록 표현하세요.\n`;
    } else if (r.t === '충') {
      t += `일지·월지가 ${r.d}으로 충돌합니다. 내면의 이중성, 긴장감을 눈빛이나 자세에 반영하세요.\n`;
    }
  }

  // ─── 규칙 ───
  t += `\n■ 반드시 지켜야 할 규칙\n`;
  t += `1. 그림 스타일: 일본 만화 현대 소년물 (선이 굵고 명확, 명암 대비 강함)\n`;
  t += `2. 배경: 순수 흰색(#FFFFFF)만. 어떤 배경 요소도 넣지 않음\n`;
  t += `3. 왼쪽 상단에 "${il}" 텍스트를 작게 표기 (캐릭터와 겹치지 않게)\n`;
  t += `4. 현대물 기준 의상. 판타지 갑옷·한복·날개·뿔·무기(검, 지팡이 등) 금지. 오행 색감은 악세서리·의상 디테일로만 반영\n`;
  t += `5. 전신 기본 정자세. 성격에 맞는 약간의 포즈 변형 허용\n`;
  t += `6. 한 명의 캐릭터만 그릴 것`;
  return t;
}

// ================================================================
// SD/ComfyUI 프롬프트
// ================================================================
function genSD(il, g, w, job) {
  const ge = g === '남' ? 'male' : 'female';
  const oh = OH_MAP[il[0]];
  const gt = getGenderTraits(il[0], g === '남' ? '남' : '녀');
  const dnaG = getDNAGender(il, g);

  let parts = [
    'Japanese shonen manga style, modern setting, full body, standing pose',
    'pure white background',
    'bold ink outlines, detailed manga eyes, cel shading',
    `single ${ge} character`
  ];

  // 직업 키워드 — JSON에서 읽기
  if (job) {
    const jv = (DB.job_visual||{})[job];
    parts.push(jv && jv.sd ? jv.sd : job);
  }

  const ohStyles = {
    목:'slender tall, green/beige tones',
    화:'athletic vivid, red/orange accent',
    토:'sturdy broad, brown/khaki earth tones',
    금:'angular sharp, monochrome silver/black',
    수:'fluid graceful, navy/blue/purple tones'
  };
  parts.push(ohStyles[oh] || '');

  // 영문 외형 태그 (시트10)
  if (gt['프롬프트외형태그']) {
    parts.push(gt['프롬프트외형태그'].substring(0, 80));
  }

  // DNA 분위기 키워드 (H2에서 영문 부분 추출)
  const h2 = (dnaG['H2_분위기'] || '').trim();
  const enMatch = h2.match(/[a-zA-Z][a-zA-Z, ]+/g);
  if (enMatch) {
    parts.push(enMatch.join(', ').substring(0, 60));
  }

  if (w) {
    const seasonEn = {寅:'spring green fresh',卯:'spring vibrant',辰:'misty transition',巳:'summer warm red',午:'summer intense bright',未:'humid warm',申:'autumn cool gold',酉:'autumn silver moonlight',戌:'autumn sunset brown',亥:'winter deep navy',子:'winter midnight dark',丑:'winter dawn muted'};
    parts.push(seasonEn[w] || '');
  }

  parts.push(`small text '${il}' top left corner`, 'masterpiece, best quality, highly detailed');

  return {
    pos: parts.filter(p => p).join(', '),
    neg: 'background, scenery, multiple characters, chibi, realistic photo, 3D, watermark, fantasy armor, medieval, wings, horns, animal ears, weapon, sword, staff, shield, magic aura, glowing effects, blurry, bad anatomy, extra limbs'
  };
}

// ================================================================
// 복사
// ================================================================
function doCopy(text, btnId) {
  const btn = document.getElementById(btnId);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => ok(btn)).catch(() => fb(text, btn));
    return;
  }
  fb(text, btn);
}
function fb(text, btn) {
  const ta = document.getElementById('hc');
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0.01';
  ta.value = text; ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
  try { if (document.execCommand('copy')) ok(btn); else mn(btn); } catch(e) { mn(btn); }
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
}
function ok(btn) { if(btn){btn.textContent='✅ 복사 완료!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='📋 복사';btn.classList.remove('ok')},2000)} }
function mn(btn) { if(btn) btn.textContent='⚠ 텍스트 클릭 후 Ctrl+C'; }
function selAll(el) { el.focus(); el.select(); el.setSelectionRange(0, el.value.length); }

// UI 렌더링

function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `<div id="grid" class="grid60"></div><div id="panel"></div>
    <div class="guide">
      <strong>📖 사용법</strong><br>
      ① 일주 클릭 → 성별 선택 → (선택) 월지 선택<br>
      ② <strong style="color:#ff9800">「웹AI용 복사」</strong> 클릭 → ChatGPT/Gemini/Claude에 Ctrl+V<br>
      ③ SD/ComfyUI 사용자는 하단 토글 열어서 영문 프롬프트 복사<br>
      ※ 복사 안 되면 텍스트 영역 클릭(전체선택) → Ctrl+C

  rGrid();
}

function rGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  IL.forEach(il => {
    const oh = OH_MAP[il[0]];
    const b = document.createElement('button');
    b.innerHTML = `<span style="font-size:14px;font-weight:700">${il}</span><span class="sl">${KR_CH[il[0]]}${KR_JI[il[1]]}</span>`;
    b.dataset.il = il;
    b.onclick = () => { S.ilju = il; S.w = null; S.job = null; rAll(); };
    g.appendChild(b);
  });
}

function rAll() {
  document.querySelectorAll('.grid60 button').forEach(b => {
    const is = b.dataset.il === S.ilju, oh = b.dataset.il ? OH_MAP[b.dataset.il[0]] : '';
    b.style.background = is ? OC[oh] || '#333' : '#141414';
    b.style.color = is ? '#fff' : '#888';
    b.style.borderColor = is ? OC[oh] || '#555' : '#2a2a2a';
    b.style.fontWeight = is ? '800' : '500';
  });
  rPanel();
}

function rPanel() {
  const P = document.getElementById('panel');
  if (!S.ilju) { P.innerHTML = ''; return; }
  const il = S.ilju, g = S.g, w = S.w;
  const oh = OH_MAP[il[0]], oc = OC[oh];
  const iu = getIljuUnique(il);
  const wp = genWebAI(il, g, w, S.job), sd = genSD(il, g, w, S.job);
  const r = w ? cr(il[1], w) : null;

  let h = `<div class="panel">`;
  h += `<div class="row"><span style="font-size:28px;font-weight:900;color:${oc}">${il}</span>`;
  h += `<span style="font-size:12px;color:#777">${KR_CH[il[0]]}(${il[0]})+${KR_JI[il[1]]}(${il[1]})</span></div>`;

  // 뱃지
  h += `<div class="row" style="margin-bottom:10px">`;
  [{l:'오행',v:oh},{l:'음양',v:YY_MAP[il[0]]}].forEach(b => { h += `<span class="badge"><strong style="color:${oc}">${b.l}</strong> ${b.v}</span>`; });
  if (iu['십이운성']) h += `<span class="badge"><strong style="color:#ab47bc">운성</strong> ${iu['십이운성']}</span>`;
  if (iu['일지십성']) h += `<span class="badge"><strong style="color:#42a5f5">십성</strong> ${iu['일지십성']}</span>`;
  if (iu['납음']) h += `<span class="badge"><strong style="color:#ff9800">납음</strong> ${iu['납음']}</span>`;
  if (w) {
    h += `<span class="badge"><strong style="color:#66bb6a">계절</strong> ${SEASON_MAP[w]||''}</span>`;
  }
  h += `</div>`;

  // 성별
  h += `<div style="margin-bottom:10px"><span style="font-size:11px;color:#888;font-weight:700;margin-right:8px">성별</span>`;
  h += `<button class="gbtn ${g==='남'?'am':''}" onclick="S.g='남';S.job=null;rAll()">♂ 남</button> `;
  h += `<button class="gbtn ${g==='녀'?'af':''}" onclick="S.g='녀';S.job=null;rAll()">♀ 녀</button></div>`;

  // 월지
  h += `<div style="margin-bottom:10px"><div class="wlabel">🌙 월지 보정 (선택)</div><div class="wg">`;
  h += `<button class="${!w?'sel':''}" onclick="S.w=null;rAll()">없음</button>`;
  WJ_JI.forEach((k,i) => {
    const is = w === k;
    const monthNum = ((i+1) % 12) || 12;
    h += `<button class="${is?'sel':''}" onclick="S.w='${k}';rAll()"><div>${KR_JI[k]}(${k})</div><div style="font-size:7px;opacity:.7">${monthNum}월</div></button>`;
  });
  h += `</div></div>`;

  // 직업 선택
  const jobs = getJobList(il, g);
  h += `<div style="margin-bottom:10px"><div class="wlabel">💼 직업 선택 (선택) <span style="color:#555;font-weight:400">${jobs.length}개</span></div>`;
  h += `<div class="jg">`;
  const noJob = !S.job;
  h += `<button class="jbtn${noJob?' jsel':''}" onclick="S.job=null;rAll()">제외</button>`;
  jobs.forEach(j => {
    const isSel = S.job === j;
    h += `<button class="jbtn${isSel?' jsel':''}" onclick="S.job='${j}';rAll()">${j}</button>`;
  });
  h += `</div>`;
  if (S.job) {
    h += `<div style="margin-top:4px;font-size:10px;color:#ff9800">📌 「${S.job}」 직업 비주얼이 프롬프트에 반영됩니다.</div>`;
  }
  h += `</div>`;

  // 합충 표시
  if (r && r.t) { h += `<div class="rel-box ${r.t==='육합'?'rel-h':'rel-c'}">${r.t==='육합'?'🤝':'⚔️'} <strong>${r.d}</strong> — ${r.pk}</div>`; }

  // ★ 웹AI
  h += `<div class="psec"><div class="plbl"><span style="color:#ff9800;font-size:14px">★ 웹AI용 프롬프트</span>`;
  h += `<button class="cbtn" id="cp1" onclick="doCopy(document.getElementById('t1').value,'cp1')">📋 복사</button></div>`;
  h += `<textarea class="ptxt big" id="t1" onclick="selAll(this)" readonly>${wp}</textarea>`;
  h += `<div class="tip">💡 복사 버튼이 안 되면 → 텍스트 영역 클릭(전체 선택) → Ctrl+C</div></div>`;

  // SD 토글
  h += `<div style="margin-top:4px"><button onclick="var el=document.getElementById('sdw');if(el.style.display==='none'){el.style.display='block';this.textContent='▼ SD/ComfyUI 프롬프트 닫기'}else{el.style.display='none';this.textContent='▶ SD/ComfyUI 프롬프트 열기'}" style="font-size:11px;padding:5px 14px;background:#1a1a1a;color:#888;border:1px solid #333;border-radius:3px;cursor:pointer;font-family:inherit">▶ SD/ComfyUI 프롬프트 열기</button></div>`;
  h += `<div id="sdw" style="display:none;margin-top:8px">`;
  h += `<div class="psec"><div class="plbl"><span style="color:#66bb6a">Positive</span><button class="cbtn2" id="cp2" onclick="doCopy(document.getElementById('t2').value,'cp2')">📋 복사</button></div>`;
  h += `<textarea class="ptxt" id="t2" onclick="selAll(this)" readonly>${sd.pos}</textarea></div>`;
  h += `<div class="psec"><div class="plbl"><span style="color:#ef5350">Negative</span><button class="cbtn2" id="cp3" onclick="doCopy(document.getElementById('t3').value,'cp3')">📋 복사</button></div>`;
  h += `<textarea class="ptxt" id="t3" onclick="selAll(this)" readonly style="min-height:50px;font-size:10px;color:#777">${sd.neg}</textarea></div></div>`;

  h += `</div>`;
  P.innerHTML = h;
}
